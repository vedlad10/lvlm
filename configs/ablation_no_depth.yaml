# Ablation Study: No Adaptive Depth
# Tests: Does adaptive reasoning depth help Qwen?

project_name: "LVLM-Qwen-Ablation-NoDepth"
experiment_id: "${project_name}_${now:%Y%m%d_%H%M%S}"
seed: 42

# ============================================================================
# QWEN MODEL CONFIGURATION
# ============================================================================
qwen:
  model_name: "Qwen/Qwen2.5-7B-Instruct"
  lora_rank: 16
  lora_alpha: 32
  lora_dropout: 0.05
  use_4bit: true
  max_seq_length: 4096

# ============================================================================
# TRAINING CONFIGURATION
# ============================================================================
training:
  stage: 1
  num_epochs: 15
  batch_size: 16
  gradient_accumulation_steps: 2
  num_workers: 4
  
  optimizer:
    type: "adamw"
    lr: 2e-4
    weight_decay: 1e-5
  
  scheduler:
    type: "cosine"
    warmup_steps: 500
  
  max_grad_norm: 1.0
  early_stopping:
    patience: 5
    monitor: "val_loss"

# ============================================================================
# LOSS WEIGHTS
# ============================================================================
loss_weights:
  qa: 1.0
  grounding: 0.5
  contrastive: 0.1
  regularization: 0.05

# ============================================================================
# LVLM INTEGRATION - NO ADAPTIVE DEPTH
# ============================================================================
lvlm:
  feature_dim: 768
  
  temporal_binding:
    enabled: true                  # Keep temporal binding
    num_memory_nodes: 8
    gate_type: "learned"
  
  adaptive_depth:
    enabled: false                 # ⚠️ ABLATION: Disable adaptive depth
    max_hops: 5                    # Fixed at 5
    entropy_threshold: 0.5
  
  freeze_encoder: true
  freeze_temporal_binding: true
  freeze_chimrt: true

# ============================================================================
# DATA CONFIGURATION
# ============================================================================
data:
  datasets:
    - "tvqa"
  
  train_split: 0.8
  val_split: 0.2
  
  preprocessing:
    max_frames: 64
    feature_cache: true
    normalize_features: true

# ============================================================================
# LOGGING
# ============================================================================
logging:
  use_wandb: true
  wandb_project: "lvlm-qwen-ablation"
  experiment_name: "ablation-no-adaptive-depth"
  log_interval: 10
  save_strategy: "best"
  save_total_limit: 3

# ============================================================================
# EVALUATION
# ============================================================================
evaluation:
  eval_strategy: "epoch"
  compute_metrics: true
  metrics:
    - "accuracy"
    - "f1"
    - "bleu"

# ============================================================================
# INFERENCE
# ============================================================================
inference:
  max_new_tokens: 128
  num_beams: 4

# ============================================================================
# ABLATION SETTINGS
# ============================================================================
ablation:
  ablate_temporal_binding: false
  ablate_adaptive_depth: true    # Main ablation
  ablate_lora: false
  fixed_depth: 5                 # Force all questions to use 5 hops

# ============================================================================
# HARDWARE
# ============================================================================
hardware:
  device: "cuda"
  dtype: "float16"
  compile_model: false
